name: Nightly Pipeline

on:
  schedule:
    # 06:00 UTC = 08:00 CEST. Borsdata's Nordic EOD lands the prior evening, but its
    # GLOBAL/US batch is published later in the European morning (the US session closes
    # 22:00 CEST and is not in Borsdata by 03:00 CEST). Running at 06:00 UTC clears the
    # global batch yet stays before Nordic open (07:00 UTC), so Nordic keeps its prior
    # complete session. run.py also aborts if US data is still behind Nordic.
    - cron: '0 6 * * *'
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify secrets and connectivity
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          BORSDATA_API_KEY:     ${{ secrets.BORSDATA_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python - <<'EOF'
          import os, sys, psycopg2, requests

          errors = []

          # Check required secrets are non-empty
          for key in ["DATABASE_URL", "BORSDATA_API_KEY", "ANTHROPIC_API_KEY", "SUPABASE_URL", "SUPABASE_SERVICE_KEY"]:
              if not os.getenv(key, "").strip():
                  errors.append(f"SECRET MISSING: {key}")

          # Test database connection
          db_url = os.getenv("DATABASE_URL", "")
          if db_url:
              try:
                  conn = psycopg2.connect(db_url.replace("postgresql://", "postgresql://", 1), connect_timeout=10)
                  conn.close()
                  print("DB connection: OK")
              except Exception as e:
                  errors.append(f"DB connection failed: {e}")

          # Test Borsdata API key
          bd_key = os.getenv("BORSDATA_API_KEY", "")
          if bd_key:
              try:
                  r = requests.get(
                      "https://apiservice.borsdata.se/v1/instruments",
                      params={"authKey": bd_key, "maxCount": 1},
                      timeout=10
                  )
                  if r.status_code == 200:
                      print("Borsdata API: OK")
                  else:
                      errors.append(f"Borsdata API returned {r.status_code}")
              except Exception as e:
                  errors.append(f"Borsdata API failed: {e}")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)

          print("All checks passed.")
          EOF

      - name: Run pipeline
        env:
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          BORSDATA_API_KEY:    ${{ secrets.BORSDATA_API_KEY }}
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL:         ${{ secrets.ALERT_EMAIL }}
        run: python run.py --region all
