name: Streamlit Keep-Alive

on:
  schedule:
    - cron: '0 */8 * * *'   # ping every 8 hours to prevent 7-day inactivity sleep

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://stock-screener-nvue9g3ik3jyfmzbjd7nms.streamlit.app/)
          echo "HTTP status: $STATUS"
